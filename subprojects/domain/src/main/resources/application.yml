spring:
  datasource:
    url: "jdbc://mysql://mysql:3306/mydb"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "myuser"
    password: "mypass123"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

logging:
  level:
    org.hibernate.SQL: debug
